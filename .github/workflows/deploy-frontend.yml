name: Deploy Frontend to Fasthosts

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Fasthosts via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -c "set ftp:passive-mode yes; set ssl:verify-certificate no; set ftp:use-size no; set ftp:use-mdtm no; set ftp:use-allo no; set ftp:use-feat no; open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}; mirror -R frontend/dist/ wunwurd/ --delete --verbose"
