<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />

        <title>Whisky Blender | Page not found</title>

        <link href="https://fonts.googleapis.com/css?family=Raleway:400,600,700" rel="stylesheet" />
        <link rel="stylesheet" type="text/css" href="css/wb-base.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-global.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-fonts.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-header.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-footer.css" />
        <link rel="icon" type="image/png" sizes="600x600" href="images/wb-favicon.png" />

        <meta content="Andrews of Bothwell" name="author" />
        <meta content="noindex,nofollow" name="robots" />

        <script>
            function includeHTML() {
                var z, i, elmnt, file, xhttp;
                z = document.getElementsByTagName("*");
                for (i = 0; i < z.length; i++) {
                    elmnt = z[i];
                    file = elmnt.getAttribute("w3-include-html");
                    if (file) {
                        xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4) {
                                if (this.status == 200) { elmnt.innerHTML = this.responseText; }
                                if (this.status == 404) { elmnt.innerHTML = "Page not found."; }
                                elmnt.removeAttribute("w3-include-html");
                                includeHTML();
                            }
                        };
                        xhttp.open("GET", file + "?t=" + Date.now(), true);
                        xhttp.send();
                        return;
                    }
                }
            }
        </script>
    </head>
    <body>
        <div w3-include-html="wb-header.html"></div>
        <main>
            <section class="wb-first-item">
                <div class="wb-container">
                    <div class="wb-padding">
                        <h1 class="wb-large-heading">Um...</h1>
                        <p>This page doesn't exist — or it's been moved. Either way, there's nothing here.</p>
                        <div class="wb-buttons">
                            <a href="index.html" class="wb-button wb-primary-button">Back to home</a>
                            <a href="shop.html" class="wb-button">Visit the shop</a>
                        </div>
                    </div>
                </div>
            </section>
            <section class="wb-banded">
                <div data-cta="createunique" w3-include-html="wb-cta.html"></div>
            </section>
        </main>
        <div w3-include-html="wb-footer.html"></div>
        <script>
            includeHTML();
        </script>
    </body>
</html>
